<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法蘭西班表生成器v3.29</title>
  <style>
    body {
      font-family: "Noto Sans TC", sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 22px;
    }
    input, button {
      font-size: 16px;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      background: #9820C5;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 8px;
    }
    pre {
      background: white;
      padding: 15px;
      margin-top: 15px;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.6;
      border-radius: 8px;
    }
    footer {
  margin-top: 30px;
  text-align: center;
  font-size: 13px;
  color: #888;
}
  </style>
</head>
<body>

<h1>法蘭西班表生成器v3.29</h1>

<input id="portInput" placeholder="例如：納塔爾">
<button onclick="generate()">生成班表</button>
<button onclick="copyText()">一鍵複製</button>

<pre id="output"></pre>

<script>
function getDisplayWidth(str) {
  // 中文算2，英文/數字算1
  let width = 0;
  for (let ch of str) {
    width += /[\u4e00-\u9fff]/.test(ch) ? 2 : 1;
  }
  return width;
}

function padTitle(name) {
  const totalWidth = 35; // 全形18字 = 半形36寬
  const base = `[${name}]班機`;
  const baseWidth = getDisplayWidth(base);
  const dashCount = Math.max(0, totalWidth - baseWidth);
  return base + "-".repeat(dashCount);
}

function generate() {
  const port = document.getElementById("portInput").value.trim();
  if (!port) {
    alert("請輸入港口名稱");
    return;
  }

  const title = padTitle(port);

  const content = `${title}
﹥晚霞 19：20 - -
﹥茲歐文 19：40
﹥辣椒 21：20 - -
﹥Mimi 22：20
﹥丟丟 22：40`;

  document.getElementById("output").textContent = content;
}

function copyText() {
  const text = document.getElementById("output").textContent;
  if (!text) {
    alert("沒有可複製的內容");
    return;
  }

  navigator.clipboard.writeText(text).then(() => {
    alert("已複製！");
  });
}
</script>
<footer>© 2026 凌岩. All rights reserved.</footer>
</body>
</html>
